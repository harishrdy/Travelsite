services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${BACKEND_CONNECTION_STRING:?Set BACKEND_CONNECTION_STRING in .env}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in .env}
      Jwt__Issuer: ${JWT_ISSUER:-PickNBookApi}
      Jwt__Audience: ${JWT_AUDIENCE:-PickNBookUsers}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Cors__AllowedOrigins__0: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${FRONTEND_PUBLIC_URL_ALT:-http://127.0.0.1:3000}
      Amadeus__BaseUrl: ${AMADEUS_BASE_URL:-https://test.api.amadeus.com}
      Amadeus__ClientId: ${AMADEUS_CLIENT_ID:-}
      Amadeus__ClientSecret: ${AMADEUS_CLIENT_SECRET:-}
      EmailSettings__SmtpServer: ${SMTP_SERVER:-smtp.gmail.com}
      EmailSettings__Port: ${SMTP_PORT:-587}
      EmailSettings__SenderName: ${SMTP_SENDER_NAME:-PickNBook}
      EmailSettings__SenderEmail: ${SMTP_SENDER_EMAIL:-}
      EmailSettings__Username: ${SMTP_USERNAME:-}
      EmailSettings__Password: ${SMTP_PASSWORD:-}
      WhatsAppSettings__Enabled: ${WHATSAPP_ENABLED:-false}
      WhatsAppSettings__ApiBaseUrl: ${WHATSAPP_API_BASE_URL:-https://graph.facebook.com/v20.0}
      WhatsAppSettings__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WhatsAppSettings__AccessToken: ${WHATSAPP_ACCESS_TOKEN:-}
      Notifications__TicketEmailUrl: ${TICKET_EMAIL_URL:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_wwwroot:/app/wwwroot
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/}
        REACT_APP_AUTH_API_BASE_URL: ${REACT_APP_AUTH_API_BASE_URL:-/}
        REACT_APP_BUS_API_BASE_URL: ${REACT_APP_BUS_API_BASE_URL:-/}
        REACT_APP_ADMIN_API_BASE_URL: ${REACT_APP_ADMIN_API_BASE_URL:-/}
        REACT_APP_DASHBOARD_API_BASE_URL: ${REACT_APP_DASHBOARD_API_BASE_URL:-/}
        REACT_APP_BANK_API_BASE_URL: ${REACT_APP_BANK_API_BASE_URL:-/}
        REACT_APP_NOTIFICATIONS_API_BASE_URL: ${REACT_APP_NOTIFICATIONS_API_BASE_URL:-/}
        REACT_APP_PLACES_API_URL: ${REACT_APP_PLACES_API_URL:-/api/Places}
        REACT_APP_USE_DIRECT_API_IN_DEV: ${REACT_APP_USE_DIRECT_API_IN_DEV:-false}
        REACT_APP_DEFAULT_USER_ID: ${REACT_APP_DEFAULT_USER_ID:-user_123}
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_wwwroot:
