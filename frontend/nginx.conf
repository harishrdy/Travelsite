server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /profile-images/ {
        proxy_pass http://backend:8080/profile-images/;
    }

    location /offers/ {
        proxy_pass http://backend:8080/offers/;
    }

    location /blogs/ {
        proxy_pass http://backend:8080/blogs/;
    }

    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
    }

    location /Images/ {
        proxy_pass http://backend:8080/Images/;
    }

    location /images/ {
        proxy_pass http://backend:8080/images/;
    }

    location /Content/ {
        proxy_pass http://backend:8080/Content/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
