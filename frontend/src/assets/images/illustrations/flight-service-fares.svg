<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 35 680 365" role="img" aria-labelledby="title desc">
  <title id="title">Flight fare comparison illustration</title>
  <desc id="desc">Three flight fare cards for economy, premium, and business cabins.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdfb"/>
      <stop offset="0.48" stop-color="#fef2f2"/>
      <stop offset="1" stop-color="#edf6ff"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="1">
      <stop offset="0" stop-color="#dc1e26"/>
      <stop offset="1" stop-color="#f6b248"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#7d3b1f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="60" y="66" width="600" height="304" rx="28" fill="#fff"/>
    <text x="96" y="116" fill="#11213f" font-family="Arial, sans-serif" font-size="26" font-weight="800">Compare Flight Fares</text>
    <text x="96" y="145" fill="#56678a" font-family="Arial, sans-serif" font-size="16" font-weight="600">Cabin choices and price clarity</text>
    <g transform="translate(92 190)">
      <rect width="154" height="126" rx="20" fill="#fff8f4" stroke="#E5E7EB"/>
      <circle cx="34" cy="34" r="18" fill="#fef2f2"/>
      <path d="M24 36h20M34 26v24" stroke="#dc1e26" stroke-width="5" stroke-linecap="round"/>
      <text x="22" y="78" fill="#11213f" font-family="Arial, sans-serif" font-size="20" font-weight="800">Economy</text>
      <text x="22" y="106" fill="#dc1e26" font-family="Arial, sans-serif" font-size="24" font-weight="900">₹ 4,890</text>
    </g>
    <g transform="translate(283 168)">
      <rect width="154" height="148" rx="22" fill="#1f2a44"/>
      <rect x="18" y="18" width="58" height="24" rx="12" fill="url(#hot)"/>
      <text x="31" y="35" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="800">BEST</text>
      <text x="22" y="82" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="800">Premium</text>
      <text x="22" y="112" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="900">₹ 7,240</text>
      <rect x="22" y="126" width="92" height="8" rx="4" fill="#f6b248"/>
    </g>
    <g transform="translate(474 190)">
      <rect width="154" height="126" rx="20" fill="#fff8f4" stroke="#E5E7EB"/>
      <circle cx="34" cy="34" r="18" fill="#fef2f2"/>
      <path d="M24 38c16-14 26-14 42 0" fill="none" stroke="#dc1e26" stroke-width="5" stroke-linecap="round"/>
      <text x="22" y="78" fill="#11213f" font-family="Arial, sans-serif" font-size="20" font-weight="800">Business</text>
      <text x="22" y="106" fill="#dc1e26" font-family="Arial, sans-serif" font-size="24" font-weight="900">₹ 18,500</text>
    </g>
  </g>
</svg>
