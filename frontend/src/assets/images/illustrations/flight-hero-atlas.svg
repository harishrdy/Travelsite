<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Premium flight booking hero scene</title>
  <desc id="desc">A cinematic airport runway with a sweeping aircraft, glass booking panels, city lights, and Atlas route arcs.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset="0.56" stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#eaf0ff"/>
    </linearGradient>
    <linearGradient id="auroraTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dc1e26" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#dc1e26" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#b8141b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="runway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10233f"/>
      <stop offset="0.58" stop-color="#17242d"/>
      <stop offset="1" stop-color="#081014"/>
    </linearGradient>
    <linearGradient id="planeBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.56" stop-color="#edf6f8"/>
      <stop offset="1" stop-color="#b9cdd7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#fef2f2" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="atlas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc1e26"/>
      <stop offset="1" stop-color="#b8141b"/>
    </linearGradient>
    <radialGradient id="beacon" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dc1e26" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#dc1e26" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#dc1e26" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#06171c" flood-opacity="0.34"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
