      <text x="24" y="34" fill="#56678a" font-family="Arial, sans-serif" font-size="16" font-weight="700">TO</text>
      <text x="24" y="62" fill="#11213f" font-family="Arial, sans-serif" font-size="24" font-weight="800">DEL</text>
