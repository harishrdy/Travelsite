<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">Flight route search illustration</title>
  <desc id="desc">A bright flight route card with city markers, route line, and airplane.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9f5"/>
      <stop offset="0.52" stop-color="#fff0e8"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1">
      <stop offset="0" stop-color="#f04423"/>
      <stop offset="1" stop-color="#df3f1f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#7d3b1f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="720" height="430" rx="28" fill="url(#bg)"/>
  <circle cx="92" cy="78" r="82" fill="#f04423" opacity="0.08"/>
  <circle cx="610" cy="350" r="108" fill="#1f2a44" opacity="0.08"/>
