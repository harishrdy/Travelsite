<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Highly Colorful Sunset Sky Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />      <!-- Slate-950 (Night) -->
      <stop offset="25%" stop-color="#1d1e4c" />     <!-- Indigo -->
      <stop offset="45%" stop-color="#701a75" />     <!-- Deep Fuchsia/Purple -->
      <stop offset="65%" stop-color="#db2777" />     <!-- Vibrant Pink/Rose -->
      <stop offset="85%" stop-color="#ea580c" />     <!-- Saffron Orange -->
      <stop offset="100%" stop-color="#facc15" />    <!-- Neon Yellow-Gold -->
    </linearGradient>
    
    <!-- Mountain Gradients (Twilight Purple & Deep Blue) -->
    <linearGradient id="mountainGradFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a154b" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#240529" />
    </linearGradient>

    <linearGradient id="mountainGradNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0a0518" />
    </linearGradient>
    
    <!-- Bridge Stone Gradient with Warm Saffron Accents -->
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2230" />
      <stop offset="50%" stop-color="#34394a" />
      <stop offset="100%" stop-color="#181c26" />
    </linearGradient>

    <!-- Glowing Headlight Beams -->
    <linearGradient id="trainLightBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="busLightBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#fde047" stop-opacity="0" />
    </linearGradient>

    <!-- Flight trail -->
    <linearGradient id="flightTrailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9" />  <!-- Hot Pink -->
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0" />
    </linearGradient>
    
    <!-- Glow filter for lights -->
    <filter id="lightGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <style>
    /* Twinkling Stars Animation */
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .star {
      animation: twinkle 4s infinite ease-in-out;
      transform-origin: center;
    }
    .star-delay-1 { animation-delay: 1.2s; }
    .star-delay-2 { animation-delay: 2.4s; }
    .star-delay-3 { animation-delay: 3.6s; }

    /* Cloud Drifting Animation */
    @keyframes cloud-drift {
      0% { transform: translate(-350px, 0); }
      100% { transform: translate(1450px, 0); }
    }
    .cloud-slow { animation: cloud-drift 85s linear infinite; }
    .cloud-fast { animation: cloud-drift 60s linear infinite; }

    /* Heritage Train Crossing Bridge Animation */
    @keyframes train-move {
      0% { transform: translate(-220px, 582px); }
      100% { transform: translate(1480px, 582px); }
    }
    .train-group {
      animation: train-move 26s linear infinite;
    }

    /* Smoke Puffing Animation */
    @keyframes smoke-rise {
      0% { transform: translate(0, 0) scale(0.6); opacity: 0.8; }
      50% { transform: translate(-8px, -18px) scale(1.1); opacity: 0.5; }
      100% { transform: translate(-20px, -42px) scale(1.7); opacity: 0; }
    }
    .smoke-puff-1 {
      animation: smoke-rise 3s infinite ease-out;
      transform-origin: 100px 5px;
    }
    .smoke-puff-2 {
      animation: smoke-rise 3s infinite ease-out;
      animation-delay: 1s;
      transform-origin: 90px 2px;
    }
    .smoke-puff-3 {
      animation: smoke-rise 3s infinite ease-out;
      animation-delay: 2s;
      transform-origin: 95px 4px;
    }

    /* Luxury Bus Driving Animation */
    @keyframes bus-drive {
      0% { transform: translate(-120px, 755px) scale(0.9); }
      50% { transform: translate(660px, 742px) scale(1); }
      100% { transform: translate(1500px, 755px) scale(0.9); }
    }
    .bus-group {
      animation: bus-drive 19s linear infinite;
    }

    /* Airplane Flight Animation */
    @keyframes airplane-fly {
      0% { transform: translate(-220px, 160px) rotate(-8deg); }
      100% { transform: translate(1500px, 70px) rotate(-8deg); }
    }
    .airplane-group {
      animation: airplane-fly 21s linear infinite;
    }
  </style>

  <!-- Sky Background -->
  <rect width="1440" height="900" fill="url(#skyGrad)" />

  <!-- Twinkling Neon Stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="90" r="1.8" class="star star-delay-1" fill="#ec4899" />   <!-- Pink Twinkler -->
    <circle cx="230" cy="40" r="1.2" class="star star-delay-2" />
    <circle cx="360" cy="110" r="2" class="star star-delay-3" fill="#a855f7" />  <!-- Purple Twinkler -->
    <circle cx="500" cy="50" r="1.5" class="star star-delay-1" />
    <circle cx="680" cy="80" r="2.2" class="star star-delay-2" fill="#38bdf8" />  <!-- Cyan Twinkler -->
    <circle cx="820" cy="70" r="1.2" class="star star-delay-3" />
    <circle cx="960" cy="120" r="1.8" class="star star-delay-1" />
    <circle cx="1100" cy="35" r="2.2" class="star star-delay-2" fill="#fbbf24" /> <!-- Gold Twinkler -->
    <circle cx="1260" cy="90" r="1.5" class="star star-delay-3" />
    <circle cx="1380" cy="65" r="1" class="star star-delay-1" />
  </g>

  <!-- Distant Glowing Horizon Glow -->
  <circle cx="720" cy="530" r="200" fill="#fef08a" opacity="0.25" filter="blur(25px)" />
  <circle cx="720" cy="530" r="130" fill="#f472b6" opacity="0.3" filter="blur(18px)" /> <!-- Pink secondary glow -->

  <!-- Drifting Clouds -->
  <g fill="#ffffff" opacity="0.09">
    <path d="M 120 180 C 120 150, 160 135, 190 150 C 210 120, 260 120, 280 150 C 310 135, 340 150, 340 180 Z" class="cloud-slow" />
    <path d="M 900 130 C 900 100, 940 85, 970 100 C 990 70, 1040 70, 1060 100 C 1090 85, 1120 100, 1120 130 Z" class="cloud-fast" />
  </g>

  <!-- Distant Purple Mountains Silhouette -->
  <path d="M 0 650 Q 300 540, 600 620 T 1200 580 T 1440 600 L 1440 900 L 0 900 Z" fill="url(#mountainGradFar)" />
  
  <!-- Closer Deep Indigo Mountains -->
  <path d="M 0 710 Q 400 610, 800 690 T 1440 670 L 1440 900 L 0 900 Z" fill="url(#mountainGradNear)" />

  <!-- Stone Arched Railway Bridge -->
  <g fill="url(#bridgeGrad)">
    <rect x="200" y="610" width="1040" height="24" rx="4" />
    <rect x="300" y="630" width="34" height="150" />
    <rect x="480" y="630" width="34" height="200" />
    <rect x="660" y="630" width="34" height="220" />
    <rect x="840" y="630" width="34" height="200" />
    <rect x="1020" y="630" width="34" height="150" />
    
    <path d="M 334 634 A 73 73 0 0 1 480 634 Z" />
    <path d="M 514 634 A 73 73 0 0 1 660 634 Z" />
    <path d="M 694 634 A 73 73 0 0 1 840 634 Z" />
    <path d="M 874 634 A 73 73 0 0 1 1020 634 Z" />
  </g>

  <!-- Glowing Neon Archway Walkway Lights -->
  <g fill="#fef08a" filter="url(#lightGlow)">
    <circle cx="407" cy="650" r="5" />
    <circle cx="587" cy="650" r="5" />
    <circle cx="767" cy="650" r="5" />
    <circle cx="947" cy="650" r="5" />
  </g>

  <!-- Animated Passenger Airplane (Rose Pink & Hot Pink Trail) -->
  <g class="airplane-group" fill="#ec4899">
    <path d="M -12 18 L -350 18" stroke="url(#flightTrailGrad)" stroke-width="5" stroke-linecap="round" />
    <path d="M 0 12 C 10 10, 45 10, 75 12 C 90 13, 100 15, 105 18 C 100 21, 90 23, 75 24 C 45 26, 10 26, 0 24 Z" />
    <path d="M 45 13 L 20 -22 L 32 -22 L 60 13 Z" />
    <path d="M 45 23 L 15 56 L 27 56 L 60 23 Z" />
    <path d="M 5 13 L -12 -3 L -2 -3 L 12 13 Z" />
    <circle cx="40" cy="16" r="1.2" fill="#ffffff" />
    <circle cx="48" cy="16" r="1.2" fill="#ffffff" />
    <circle cx="56" cy="17" r="1.2" fill="#ffffff" />
    <circle cx="64" cy="17" r="1.2" fill="#ffffff" />
    <circle cx="72" cy="18" r="1.2" fill="#ffffff" />
  </g>

  <!-- Animated Colorful Heritage Steam Train -->
  <g class="train-group">
    <!-- Glowing Headlight Beam -->
    <polygon points="130,22 280,10 280,38" fill="url(#trainLightBeam)" />
    <circle cx="130" cy="22" r="5" fill="#fde047" filter="url(#lightGlow)" />
    
    <!-- Steam Engine (Rose Pink / Red) -->
    <path d="M 120 20 L 120 10 L 105 10 L 105 2 L 95 2 L 95 10 L 80 10 L 80 0 L 72 0 L 72 10 L 50 10 L 50 26 L 130 26 L 130 20 Z" fill="#e11d48" />
    <circle cx="60" cy="27" r="4.5" fill="#111827" />
    <circle cx="75" cy="27" r="4.5" fill="#111827" />
    <circle cx="90" cy="27" r="4.5" fill="#111827" />
    <circle cx="105" cy="27" r="4.5" fill="#111827" />
    <circle cx="120" cy="27" r="4.5" fill="#111827" />
    
    <!-- Smoke Puffs -->
    <circle cx="98" cy="1" r="5" fill="#ffffff" opacity="0.3" class="smoke-puff-1" filter="url(#softBlur)" />
    <circle cx="98" cy="1" r="7" fill="#ffffff" opacity="0.2" class="smoke-puff-2" filter="url(#softBlur)" />
    <circle cx="98" cy="1" r="9" fill="#ffffff" opacity="0.1" class="smoke-puff-3" filter="url(#softBlur)" />
    
    <!-- Carriage 1 (Saffron Orange) -->
    <rect x="-10" y="10" width="50" height="16" rx="2" fill="#f97316" />
    <rect x="-5" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="7" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="19" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="31" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <circle cx="0" cy="27" r="3.5" fill="#111827" />
    <circle cx="30" cy="27" r="3.5" fill="#111827" />
    <line x1="40" y1="18" x2="50" y2="18" stroke="#ea580c" stroke-width="2.5" />

    <!-- Carriage 2 (Electric Cyan/Teal) -->
    <rect x="-70" y="10" width="50" height="16" rx="2" fill="#06b6d4" />
    <rect x="-65" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="-53" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="-41" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <rect x="-29" y="13" width="8" height="6" fill="#fef08a" filter="url(#lightGlow)" rx="1" />
    <circle cx="-60" cy="27" r="3.5" fill="#111827" />
    <circle cx="-30" cy="27" r="3.5" fill="#111827" />
    <line x1="-20" y1="18" x2="-10" y2="18" stroke="#0891b2" stroke-width="2.5" />
  </g>

  <!-- Winding Highway -->
  <path d="M -100 840 C 400 840, 600 750, 1000 800 C 1200 820, 1400 770, 1600 810" fill="none" stroke="#090d16" stroke-width="36" stroke-linecap="round" />
  <path d="M -100 840 C 400 840, 600 750, 1000 800 C 1200 820, 1400 770, 1600 810" fill="none" stroke="#eab308" stroke-dasharray="15,22" stroke-width="2" opacity="0.75" />

  <!-- Animated Neon Green/Cyan Travel Bus -->
  <g class="bus-group">
    <polygon points="10,16 -70,8 -70,26" fill="url(#busLightBeam)" />
    <circle cx="10" cy="16" r="4.5" fill="#fde047" filter="url(#lightGlow)" />
    <circle cx="80" cy="16" r="3" fill="#ec4899" filter="url(#lightGlow)" />

    <!-- Bus Body (Electric Emerald Green) -->
    <path d="M 10 12 L 10 6 C 10 4.5, 12 3, 15 3 L 75 3 C 78 3, 80 4.5, 80 6 L 80 22 C 80 23, 79 24, 77 24 L 13 24 C 11 24, 10 23, 10 22 Z" fill="#10b981" />
    
    <rect x="16" y="6" width="10" height="8" fill="#fef08a" filter="url(#lightGlow)" rx="1.5" />
    <rect x="29" y="6" width="10" height="8" fill="#fef08a" filter="url(#lightGlow)" rx="1.5" />
    <rect x="42" y="6" width="10" height="8" fill="#fef08a" filter="url(#lightGlow)" rx="1.5" />
    <rect x="55" y="6" width="10" height="8" fill="#fef08a" filter="url(#lightGlow)" rx="1.5" />
    <rect x="68" y="6" width="8" height="8" fill="#fef08a" filter="url(#lightGlow)" rx="1.5" />
    
    <circle cx="26" cy="25" r="6.5" fill="#111827" />
    <circle cx="26" cy="25" r="3" fill="#d1d5db" />
    <circle cx="64" cy="25" r="6.5" fill="#111827" />
    <circle cx="64" cy="25" r="3" fill="#d1d5db" />
  </g>
</svg>
